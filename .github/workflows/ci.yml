name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend Tests, Build and Contract Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: receipt-scanner-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: receipt-scanner-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenAPI JSON
        run: npm run check:openapi

      - name: Run backend tests
        run: npm test

      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: receipt-scanner-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: receipt-scanner-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
